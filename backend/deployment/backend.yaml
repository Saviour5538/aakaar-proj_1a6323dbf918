AWSTemplateFormatVersion: '2010-09-09'

Resources:

  BackendService:

    Type: AWS::Lambda::Function

    Properties:

      FunctionName: !Sub 'backend-service-${AWS::Region}'

      Runtime: python3.9

      Handler: index.handler

      Role: !GetAtt 'LambdaExecutionRole.Arn'

      Code:

        S3Bucket: backend-bucket

        S3ObjectKey: backend.zip

  LambdaExecutionRole:

    Type: AWS::IAM::Role

    Properties:

      AssumeRolePolicyDocument:

        Version: '2012-10-17'

        Statement:

          - Effect: Allow

            Principal:

              Service: lambda.amazonaws.com

            Action: sts:AssumeRole

      Policies:

        - PolicyName: execution-role-policy

          PolicyDocument:

            Version: '2012-10-17'

            Statement:

              - Effect: Allow

                Action:

                  - logs:CreateLogGroup

                  - logs:CreateLogStream

                  - logs:PutLogEvents

                Resource: arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/backend-service

              - Effect: Allow

                Action:

                  - dynamodb:GetItem

                  - dynamodb:PutItem

                  - dynamodb:UpdateItem

                  - dynamodb:DeleteItem

                Resource: !GetAtt 'DatabaseTable.Arn'

  DatabaseTable:

    Type: AWS::DynamoDB::Table

    Properties:

      TableName: !Sub 'database-table-${AWS::Region}'

      AttributeDefinitions:

        - AttributeName: id

          AttributeType: S

      KeySchema:

        - AttributeName: id

          KeyType: HASH

      TableStatus: ACTIVE